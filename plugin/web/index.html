<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Session Manager</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d1117;
  --surface: #161b22;
  --border: #30363d;
  --text: #e6edf3;
  --muted: #8b949e;
  --accent: #58a6ff;
  --success: #3fb950;
  --warning: #d29922;
  --danger: #f85149;
  --font: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
}

a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px;
}

/* Header */
header {
  border-bottom: 1px solid var(--border);
  padding: 16px 0;
  margin-bottom: 24px;
}
header .container {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
header h1 {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
}
header h1 span { color: var(--accent); }

/* Navigation */
nav {
  border-bottom: 1px solid var(--border);
  margin-bottom: 24px;
}
nav .container {
  display: flex;
  gap: 0;
}
nav button {
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--muted);
  font-family: var(--font);
  font-size: 14px;
  padding: 12px 20px;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
}
nav button:hover { color: var(--text); }
nav button:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: -2px;
}
nav button.active {
  color: var(--text);
  border-bottom-color: var(--accent);
}

/* Tab content */
.tab-content {
  display: none;
  opacity: 0;
  transition: opacity 0.2s ease;
}
.tab-content.active {
  display: block;
  opacity: 1;
}

/* Loading & Error */
.loading, .error-msg, .empty-msg {
  text-align: center;
  padding: 48px 24px;
  color: var(--muted);
  font-size: 14px;
}
.error-msg { color: var(--danger); }

/* Stats grid */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-bottom: 32px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
}
.stat-card .label {
  font-size: 12px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 8px;
}
.stat-card .value {
  font-size: 28px;
  font-weight: 700;
}
.stat-card .value.green { color: var(--success); }
.stat-card .value.blue { color: var(--accent); }

/* Section headers */
.section-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

/* Recent activity list */
.activity-list { list-style: none; }
.activity-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.activity-item:last-child { border-bottom: none; }
.activity-meta {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-shrink: 0;
}
.activity-summary {
  color: var(--muted);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.activity-time {
  color: var(--muted);
  font-size: 12px;
  flex-shrink: 0;
}

/* Badges & pills */
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 500;
  background: var(--border);
  color: var(--text);
  white-space: nowrap;
}
.badge.repo { background: #1f3a5f; color: var(--accent); }
.badge.branch { background: #2a1f3f; color: #bc8cff; }

.status-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 500;
}
.status-badge.active { background: #0f2d1a; color: var(--success); }
.status-badge.paused { background: #2d2200; color: var(--warning); }
.status-badge.completed { background: #0d2644; color: var(--accent); }
.status-badge.abandoned { background: #2d0f0f; color: var(--danger); }

.class-pill {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 500;
}
.class-pill.meaningful { background: #0f2d1a; color: var(--success); }
.class-pill.noise { background: #21262d; color: var(--muted); }
.class-pill.orphaned { background: #2d2200; color: var(--warning); }

.tag-pill {
  display: inline-block;
  padding: 1px 8px;
  border-radius: 10px;
  font-size: 11px;
  background: #1f3a5f;
  color: var(--accent);
  margin: 2px 4px 2px 0;
}

/* Filter bar */
.filter-bar {
  display: flex;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
  margin-bottom: 16px;
  padding: 12px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
}
.filter-bar select,
.filter-bar input[type="text"],
.filter-bar input[type="search"] {
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 12px;
  font-family: var(--font);
  font-size: 13px;
}
.filter-bar select:focus,
.filter-bar input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 1px var(--accent);
}

/* Buttons */
.btn {
  font-family: var(--font);
  font-size: 13px;
  padding: 6px 14px;
  border-radius: 6px;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
}
.btn:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}
.btn-default {
  background: var(--surface);
  color: var(--text);
}
.btn-default:hover { border-color: var(--muted); }
.btn-danger {
  background: #2d0f0f;
  color: var(--danger);
  border-color: #5c2020;
}
.btn-danger:hover { background: #3d1515; }
.btn-accent {
  background: #0d2644;
  color: var(--accent);
  border-color: #1f3a5f;
}
.btn-accent:hover { background: #142f55; }

/* Tables */
table {
  width: 100%;
  border-collapse: collapse;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
thead th {
  text-align: left;
  padding: 10px 12px;
  font-size: 12px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  font-weight: 600;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  cursor: default;
  white-space: nowrap;
  user-select: none;
}
thead th.sortable { cursor: pointer; }
thead th.sortable:hover { color: var(--text); }
thead th.sorted-asc::after { content: ' \u25B2'; font-size: 10px; }
thead th.sorted-desc::after { content: ' \u25BC'; font-size: 10px; }
tbody td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  vertical-align: top;
}
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover { background: #1c2129; }
tbody tr.noise-row { opacity: 0.6; }
tbody tr.expandable { cursor: pointer; }
tbody tr.expanded { background: #1c2129; }
.expand-row td {
  padding: 16px 24px;
  background: #1c2129;
  border-bottom: 1px solid var(--border);
}
.expand-row .detail-label {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 4px;
}
.expand-row .detail-text {
  margin-bottom: 12px;
  color: var(--text);
}
.expand-row .detail-text:last-child { margin-bottom: 0; }

/* Checkbox */
input[type="checkbox"] {
  accent-color: var(--accent);
  width: 15px;
  height: 15px;
  cursor: pointer;
}

/* Delete button in actions */
.btn-icon {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 16px;
  padding: 4px 8px;
  border-radius: 4px;
  font-family: var(--font);
}
.btn-icon:hover { color: var(--danger); background: #2d0f0f; }
.btn-icon:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

/* Bulk action bar */
.bulk-bar {
  display: none;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 12px 24px;
  z-index: 100;
  box-shadow: 0 -4px 16px rgba(0,0,0,0.4);
}
.bulk-bar.visible { display: block; }
.bulk-bar .container {
  display: flex;
  align-items: center;
  gap: 16px;
}
.bulk-bar .count {
  font-size: 13px;
  color: var(--text);
  flex: 1;
}

/* Modal overlay */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
.modal-overlay.visible {
  display: flex;
}
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 24px;
  max-width: 440px;
  width: 90%;
}
.modal.modal-wide {
  max-width: 720px;
}
.modal pre.takeaway-content {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 16px;
  max-height: 60vh;
  overflow: auto;
  white-space: pre-wrap;
  word-wrap: break-word;
  font-size: 13px;
  line-height: 1.5;
  color: var(--fg);
  margin-bottom: 16px;
}
.modal h3 {
  font-size: 15px;
  margin-bottom: 12px;
}
.modal p {
  color: var(--muted);
  font-size: 13px;
  margin-bottom: 20px;
}
.modal .actions {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
}

/* Knowledge cards */
.knowledge-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 16px;
}
.knowledge-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
}
.knowledge-card .card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 12px;
}
.knowledge-card .card-title {
  font-weight: 600;
  font-size: 14px;
}
.knowledge-card .card-date {
  font-size: 12px;
  color: var(--muted);
  flex-shrink: 0;
}
.knowledge-card .card-summary {
  color: var(--muted);
  font-size: 13px;
  margin: 8px 0 12px;
  line-height: 1.6;
}
.knowledge-card .card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}

/* Search input */
.search-bar {
  margin-bottom: 20px;
}
.search-bar input {
  width: 100%;
  max-width: 400px;
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 14px;
  font-family: var(--font);
  font-size: 14px;
}
.search-bar input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 1px var(--accent);
}
.search-bar input::placeholder { color: var(--muted); }

/* Responsive */
@media (max-width: 1024px) {
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .knowledge-grid { grid-template-columns: 1fr; }
}

/* Summary column truncation */
.summary-cell {
  max-width: 260px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* Scrollable table wrapper */
.table-wrap {
  overflow-x: auto;
  border-radius: 8px;
}
</style>
</head>
<body>

<header>
  <div class="container">
    <h1><span>&gt;</span> claude-session-manager</h1>
  </div>
</header>

<nav aria-label="Main navigation">
  <div class="container">
    <button class="nav-tab active" data-tab="overview" aria-label="Overview tab" aria-selected="true" role="tab">Overview</button>
    <button class="nav-tab" data-tab="projects" aria-label="Projects tab" aria-selected="false" role="tab">Projects</button>
    <button class="nav-tab" data-tab="sessions" aria-label="Sessions tab" aria-selected="false" role="tab">Sessions</button>
    <button class="nav-tab" data-tab="knowledge" aria-label="Knowledge tab" aria-selected="false" role="tab">Knowledge</button>
  </div>
</nav>

<main class="container">
  <!-- Overview -->
  <section id="tab-overview" class="tab-content active" role="tabpanel" aria-label="Overview">
    <div class="loading">Loading...</div>
  </section>

  <!-- Projects -->
  <section id="tab-projects" class="tab-content" role="tabpanel" aria-label="Projects">
    <div class="loading">Loading...</div>
  </section>

  <!-- Sessions -->
  <section id="tab-sessions" class="tab-content" role="tabpanel" aria-label="Sessions">
    <div class="loading">Loading...</div>
  </section>

  <!-- Knowledge -->
  <section id="tab-knowledge" class="tab-content" role="tabpanel" aria-label="Knowledge">
    <div class="loading">Loading...</div>
  </section>
</main>

<!-- Bulk action bar -->
<div class="bulk-bar" id="bulk-bar" aria-label="Bulk actions">
  <div class="container">
    <span class="count" id="bulk-count">0 sessions selected</span>
    <button class="btn btn-danger" id="bulk-delete-btn" aria-label="Delete selected sessions">Delete selected</button>
    <button class="btn btn-default" id="bulk-clear-btn" aria-label="Clear selection">Clear selection</button>
  </div>
</div>

<!-- Delete modal -->
<div class="modal-overlay" id="delete-modal" aria-modal="true" role="dialog" aria-label="Confirm deletion">
  <div class="modal">
    <h3>Confirm Deletion</h3>
    <p id="delete-modal-msg">Delete session(s)? This cannot be undone.</p>
    <div class="actions">
      <button class="btn btn-default" id="modal-cancel" aria-label="Cancel deletion">Cancel</button>
      <button class="btn btn-danger" id="modal-confirm" aria-label="Confirm deletion">Delete</button>
    </div>
  </div>
</div>

<!-- Takeaway modal -->
<div class="modal-overlay" id="takeaway-modal" aria-modal="true" role="dialog" aria-label="Project takeaway">
  <div class="modal modal-wide">
    <h3 id="takeaway-modal-title">Takeaway</h3>
    <pre class="takeaway-content" id="takeaway-modal-content">Loading...</pre>
    <div class="actions">
      <button class="btn btn-default" id="takeaway-modal-close">Close</button>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  // --- State ---
  let overviewData = null;
  let projectsData = null;
  let sessionsData = null;
  let knowledgeData = null;
  let configData = null;
  let selectedSessions = new Set(); // "slug/id"
  let overviewInterval = null;
  let projectsSort = { col: 'updatedAt', dir: 'desc' };
  let sessionsLoaded = false;
  let projectsLoaded = false;
  let knowledgeLoaded = false;
  let pendingDeleteCallback = null;

  // --- Helpers ---
  function timeAgo(dateStr) {
    if (!dateStr) return '';
    const now = Date.now();
    const then = new Date(dateStr).getTime();
    const diff = Math.max(0, now - then);
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return mins + 'm ago';
    const hours = Math.floor(mins / 60);
    if (hours < 24) return hours + 'h ago';
    const days = Math.floor(hours / 24);
    if (days < 30) return days + 'd ago';
    return formatDate(dateStr);
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return months[d.getMonth()] + ' ' + d.getDate();
  }

  function formatDuration(ms) {
    if (!ms && ms !== 0) return '\u2014';
    const totalMin = Math.floor(ms / 60000);
    if (totalMin < 1) return '<1m';
    if (totalMin < 60) return totalMin + 'm';
    const h = Math.floor(totalMin / 60);
    const m = totalMin % 60;
    return m > 0 ? h + 'h ' + m + 'm' : h + 'h';
  }

  function formatDurationFromSessions(s) {
    if (s.duration) return formatDuration(s.duration);
    if (s.startedAt && s.endedAt) {
      return formatDuration(new Date(s.endedAt) - new Date(s.startedAt));
    }
    return '\u2014';
  }

  function esc(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function truncate(str, len) {
    if (!str) return '';
    return str.length > len ? str.slice(0, len) + '\u2026' : str;
  }

  async function apiFetch(url) {
    const res = await fetch(url);
    if (!res.ok) throw new Error('API error: ' + res.status);
    return res.json();
  }

  // --- Tabs ---
  const tabs = document.querySelectorAll('.nav-tab');
  const panels = document.querySelectorAll('.tab-content');

  function switchTab(name) {
    tabs.forEach(t => {
      const active = t.dataset.tab === name;
      t.classList.toggle('active', active);
      t.setAttribute('aria-selected', active);
    });
    panels.forEach(p => {
      const active = p.id === 'tab-' + name;
      p.classList.toggle('active', active);
    });
    window.location.hash = '#' + name;

    // Load data for tab
    if (name === 'overview') loadOverview();
    if (name === 'projects' && !projectsLoaded) loadProjects();
    if (name === 'sessions' && !sessionsLoaded) loadSessions();
    if (name === 'knowledge' && !knowledgeLoaded) loadKnowledge();

    // Auto-refresh
    clearInterval(overviewInterval);
    if (name === 'overview') {
      overviewInterval = setInterval(loadOverview, 30000);
    }
  }

  tabs.forEach(t => {
    t.addEventListener('click', () => switchTab(t.dataset.tab));
  });

  // --- Overview ---
  async function loadOverview() {
    const el = document.getElementById('tab-overview');
    try {
      overviewData = await apiFetch('/api/overview');
      renderOverview(el);
    } catch (e) {
      el.innerHTML = '<div class="error-msg">Failed to load overview: ' + esc(e.message) + '</div>';
    }
  }

  function renderOverview(el) {
    const d = overviewData;
    const cards = [
      { label: 'Tracked Repos', value: d.repoCount, cls: '' },
      { label: 'Active Projects', value: d.activeProjects, cls: 'green' },
      { label: 'Total Sessions', value: d.totalSessions, cls: '' },
      { label: 'Sessions This Week', value: d.sessionsThisWeek, cls: '' },
      { label: 'Completed Projects', value: d.completedProjects, cls: 'blue' },
      { label: 'Projects with Takeaways', value: d.projectsWithTakeaways, cls: '' },
    ];
    let html = '<div class="stats-grid">';
    cards.forEach(c => {
      html += `<div class="stat-card">
        <div class="label">${esc(c.label)}</div>
        <div class="value ${c.cls}">${c.value != null ? c.value : 0}</div>
      </div>`;
    });
    html += '</div>';

    html += '<h2 class="section-title">Recent Activity</h2>';
    const sessions = (d.recentSessions || []).slice(0, 10);
    if (sessions.length === 0) {
      html += '<div class="empty-msg">No recent sessions.</div>';
    } else {
      html += '<ul class="activity-list">';
      sessions.forEach(s => {
        html += `<li class="activity-item">
          <div class="activity-meta">
            <span class="badge repo">${esc(s.repoDisplay || s.repoSlug)}</span>
            <span class="badge branch">${esc(s.branch || '')}</span>
          </div>
          <span class="activity-summary">${esc(truncate(s.summary, 80))}</span>
          <span class="activity-time">${timeAgo(s.startedAt)}</span>
        </li>`;
      });
      html += '</ul>';
    }
    el.innerHTML = html;
  }

  // --- Projects ---
  let projectsFilterStatus = 'all';
  let projectsFilterRepo = 'all';

  async function loadProjects() {
    const el = document.getElementById('tab-projects');
    try {
      const [projects, config] = await Promise.all([
        apiFetch('/api/projects'),
        configData ? Promise.resolve(configData) : apiFetch('/api/config')
      ]);
      projectsData = projects;
      configData = config;
      projectsLoaded = true;
      renderProjects(el);
    } catch (e) {
      el.innerHTML = '<div class="error-msg">Failed to load projects: ' + esc(e.message) + '</div>';
    }
  }

  function renderProjects(el) {
    let data = projectsData || [];

    // Collect repos/groups for filter
    const repos = [...new Set(data.map(p => p.repo).filter(Boolean))].sort();
    const groups = [...new Set(data.map(p => p.group).filter(Boolean))].sort();
    const repoDisplayMap = {};
    data.forEach(p => { if (p.repo) repoDisplayMap[p.repo] = p.repoDisplay || p.repo; });

    let html = '<div class="filter-bar">';
    html += `<select id="proj-status-filter" aria-label="Filter by status">
      <option value="all">All Statuses</option>
      <option value="active"${projectsFilterStatus==='active'?' selected':''}>Active</option>
      <option value="paused"${projectsFilterStatus==='paused'?' selected':''}>Paused</option>
      <option value="completed"${projectsFilterStatus==='completed'?' selected':''}>Completed</option>
      <option value="abandoned"${projectsFilterStatus==='abandoned'?' selected':''}>Abandoned</option>
    </select>`;
    html += `<select id="proj-repo-filter" aria-label="Filter by repo or group">
      <option value="all">All Repos</option>`;
    repos.forEach(r => {
      html += `<option value="repo:${esc(r)}"${projectsFilterRepo==='repo:'+r?' selected':''}>${esc(repoDisplayMap[r] || r)}</option>`;
    });
    groups.forEach(g => {
      html += `<option value="group:${esc(g)}"${projectsFilterRepo==='group:'+g?' selected':''}>[group] ${esc(g)}</option>`;
    });
    html += '</select></div>';

    // Filter
    let filtered = data;
    if (projectsFilterStatus !== 'all') {
      filtered = filtered.filter(p => p.status === projectsFilterStatus);
    }
    if (projectsFilterRepo !== 'all') {
      if (projectsFilterRepo.startsWith('repo:')) {
        const rv = projectsFilterRepo.slice(5);
        filtered = filtered.filter(p => p.repo === rv);
      } else if (projectsFilterRepo.startsWith('group:')) {
        const gv = projectsFilterRepo.slice(6);
        filtered = filtered.filter(p => p.group === gv);
      }
    }

    // Sort
    filtered.sort((a, b) => {
      let av = a[projectsSort.col], bv = b[projectsSort.col];
      if (av == null) av = '';
      if (bv == null) bv = '';
      if (typeof av === 'string') av = av.toLowerCase();
      if (typeof bv === 'string') bv = bv.toLowerCase();
      if (av < bv) return projectsSort.dir === 'asc' ? -1 : 1;
      if (av > bv) return projectsSort.dir === 'asc' ? 1 : -1;
      return 0;
    });

    html += '<div class="table-wrap"><table><thead><tr>';
    const cols = [
      { key: 'title', label: 'Project', sortable: true },
      { key: 'repo', label: 'Repo', sortable: true },
      { key: 'status', label: 'Status', sortable: true },
      { key: 'sessionCount', label: 'Sessions', sortable: true },
      { key: 'createdAt', label: 'Period', sortable: true },
      { key: 'hasTakeaway', label: 'Takeaway', sortable: true },
    ];
    cols.forEach(c => {
      const sorted = projectsSort.col === c.key;
      const cls = c.sortable ? 'sortable' + (sorted ? ' sorted-' + projectsSort.dir : '') : '';
      html += `<th class="${cls}" data-sort="${c.key}">${c.label}</th>`;
    });
    html += '</tr></thead><tbody>';

    if (filtered.length === 0) {
      html += '<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:24px;">No projects found.</td></tr>';
    }
    filtered.forEach((p, i) => {
      const statusCls = (p.status || 'active').toLowerCase();
      const period = formatDate(p.createdAt) + ' \u2013 ' + (p.completedAt ? formatDate(p.completedAt) : '');
      const takeaway = p.hasTakeaway
        ? `<a href="#" class="view-takeaway" data-repo="${esc(p.repo)}" data-project="${esc(p.slug)}" data-title="${esc(p.title || p.slug)}" style="color:var(--accent);text-decoration:none;cursor:pointer" title="View takeaway">\u2713</a>`
        : '\u2014';
      html += `<tr class="expandable" data-proj-idx="${i}">
        <td>${esc(p.title || p.slug)}</td>
        <td><span class="badge repo">${esc(p.repoDisplay || p.repo || '')}</span></td>
        <td><span class="status-badge ${statusCls}">${esc(p.status || 'active')}</span></td>
        <td>${p.sessionCount || 0}</td>
        <td>${period}</td>
        <td style="text-align:center">${takeaway}</td>
      </tr>
      <tr class="expand-row" id="proj-expand-${i}" style="display:none">
        <td colspan="6">
          ${p.description ? '<div class="detail-label">Description</div><div class="detail-text">' + esc(p.description) + '</div>' : ''}
          ${(p.branches && p.branches.length) ? '<div class="detail-label">Branches</div><div class="detail-text">' + p.branches.map(b => '<span class="badge branch">' + esc(b) + '</span> ').join('') + '</div>' : ''}
        </td>
      </tr>`;
    });
    html += '</tbody></table></div>';
    el.innerHTML = html;

    // Bind events
    document.getElementById('proj-status-filter').addEventListener('change', function() {
      projectsFilterStatus = this.value;
      renderProjects(el);
    });
    document.getElementById('proj-repo-filter').addEventListener('change', function() {
      projectsFilterRepo = this.value;
      renderProjects(el);
    });

    // Sort
    el.querySelectorAll('th.sortable').forEach(th => {
      th.addEventListener('click', function() {
        const key = this.dataset.sort;
        if (projectsSort.col === key) {
          projectsSort.dir = projectsSort.dir === 'asc' ? 'desc' : 'asc';
        } else {
          projectsSort.col = key;
          projectsSort.dir = 'asc';
        }
        renderProjects(el);
      });
    });

    // Expand rows
    el.querySelectorAll('tr.expandable').forEach(row => {
      row.addEventListener('click', function() {
        const idx = this.dataset.projIdx;
        const expandRow = document.getElementById('proj-expand-' + idx);
        const visible = expandRow.style.display !== 'none';
        expandRow.style.display = visible ? 'none' : 'table-row';
        this.classList.toggle('expanded', !visible);
      });
    });
  }

  // --- Sessions ---
  let sessionsFilterRepo = 'all';
  let sessionsFilterBranch = '';
  let sessionsFilterClass = 'all';

  async function loadSessions() {
    const el = document.getElementById('tab-sessions');
    try {
      sessionsData = await apiFetch('/api/sessions');
      sessionsLoaded = true;
      renderSessions(el);
    } catch (e) {
      el.innerHTML = '<div class="error-msg">Failed to load sessions: ' + esc(e.message) + '</div>';
    }
  }

  function renderSessions(el) {
    let data = sessionsData || [];

    // Collect repos
    const repos = [...new Set(data.map(s => s.repoSlug).filter(Boolean))].sort();
    const sessRepoDisplayMap = {};
    data.forEach(s => { if (s.repoSlug) sessRepoDisplayMap[s.repoSlug] = s.repoDisplay || s.repoSlug; });

    let html = '<div class="filter-bar">';
    html += `<select id="sess-repo-filter" aria-label="Filter by repo">
      <option value="all">All Repos</option>`;
    repos.forEach(r => {
      html += `<option value="${esc(r)}"${sessionsFilterRepo===r?' selected':''}>${esc(sessRepoDisplayMap[r] || r)}</option>`;
    });
    html += '</select>';
    html += `<input type="text" id="sess-branch-filter" placeholder="Branch filter..." value="${esc(sessionsFilterBranch)}" aria-label="Filter by branch">`;
    html += `<select id="sess-class-filter" aria-label="Filter by classification">
      <option value="all">All Classifications</option>
      <option value="meaningful"${sessionsFilterClass==='meaningful'?' selected':''}>Meaningful</option>
      <option value="noise"${sessionsFilterClass==='noise'?' selected':''}>Noise</option>
    </select>`;
    html += '<button class="btn btn-default" id="select-noise-btn" aria-label="Select all noise sessions">Select all noise</button>';
    html += '</div>';

    // Filter
    let filtered = data;
    if (sessionsFilterRepo !== 'all') {
      filtered = filtered.filter(s => s.repoSlug === sessionsFilterRepo);
    }
    if (sessionsFilterBranch) {
      const q = sessionsFilterBranch.toLowerCase();
      filtered = filtered.filter(s => (s.branch || '').toLowerCase().includes(q));
    }
    if (sessionsFilterClass !== 'all') {
      filtered = filtered.filter(s => (s.classification || 'meaningful') === sessionsFilterClass);
    }

    html += '<div class="table-wrap"><table><thead><tr>';
    html += '<th><input type="checkbox" id="sess-select-all" aria-label="Select all sessions"></th>';
    html += '<th>Repo</th><th>Branch</th><th>Started</th><th>Duration</th><th>Commits</th><th>Summary</th><th>Project</th><th>Classification</th><th>Actions</th>';
    html += '</tr></thead><tbody>';

    if (filtered.length === 0) {
      html += '<tr><td colspan="10" style="text-align:center;color:var(--muted);padding:24px;">No sessions found.</td></tr>';
    }
    filtered.forEach(s => {
      const cls = s.classification || 'meaningful';
      const key = s.repoSlug + '/' + s.sessionId;
      const checked = selectedSessions.has(key) ? ' checked' : '';
      const rowCls = cls === 'noise' ? 'noise-row' : '';
      html += `<tr class="${rowCls}" data-session-key="${esc(key)}">
        <td><input type="checkbox" class="sess-check" data-key="${esc(key)}"${checked} aria-label="Select session ${esc(s.sessionId)}"></td>
        <td><span class="badge repo">${esc(s.repoDisplay || s.repoSlug)}</span></td>
        <td><span class="badge branch">${esc(s.branch || '')}</span></td>
        <td>${timeAgo(s.startedAt)}</td>
        <td>${formatDurationFromSessions(s)}</td>
        <td>${s.commitCount != null ? s.commitCount : '\u2014'}</td>
        <td class="summary-cell" title="${esc(s.summary || '')}">${esc(truncate(s.summary, 50))}</td>
        <td>${esc(s.projectSlug || '\u2014')}</td>
        <td><span class="class-pill ${cls}">${cls}</span></td>
        <td><button class="btn-icon delete-single" data-slug="${esc(s.repoSlug)}" data-id="${esc(s.sessionId)}" aria-label="Delete session">\u2715</button></td>
      </tr>`;
    });
    html += '</tbody></table></div>';
    el.innerHTML = html;

    // Bind filter events
    document.getElementById('sess-repo-filter').addEventListener('change', function() {
      sessionsFilterRepo = this.value;
      renderSessions(el);
    });
    document.getElementById('sess-branch-filter').addEventListener('input', function() {
      sessionsFilterBranch = this.value;
      renderSessions(el);
    });
    document.getElementById('sess-class-filter').addEventListener('change', function() {
      sessionsFilterClass = this.value;
      renderSessions(el);
    });

    // Select all noise
    document.getElementById('select-noise-btn').addEventListener('click', function() {
      const visible = filtered.filter(s => (s.classification || 'meaningful') === 'noise');
      visible.forEach(s => selectedSessions.add(s.repoSlug + '/' + s.sessionId));
      renderSessions(el);
      updateBulkBar();
    });

    // Select all checkbox
    document.getElementById('sess-select-all').addEventListener('change', function() {
      filtered.forEach(s => {
        const key = s.repoSlug + '/' + s.sessionId;
        if (this.checked) selectedSessions.add(key);
        else selectedSessions.delete(key);
      });
      renderSessions(el);
      updateBulkBar();
    });

    // Individual checkboxes
    el.querySelectorAll('.sess-check').forEach(cb => {
      cb.addEventListener('change', function() {
        if (this.checked) selectedSessions.add(this.dataset.key);
        else selectedSessions.delete(this.dataset.key);
        updateBulkBar();
      });
    });

    // Single delete
    el.querySelectorAll('.delete-single').forEach(btn => {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        const slug = this.dataset.slug;
        const id = this.dataset.id;
        showDeleteModal(1, async function() {
          try {
            await fetch('/api/sessions/' + encodeURIComponent(slug) + '/' + encodeURIComponent(id), { method: 'DELETE' });
            sessionsData = sessionsData.filter(s => !(s.repoSlug === slug && s.sessionId === id));
            selectedSessions.delete(slug + '/' + id);
            renderSessions(el);
            updateBulkBar();
          } catch (err) {
            alert('Delete failed: ' + err.message);
          }
        });
      });
    });

    updateBulkBar();
  }

  function updateBulkBar() {
    const bar = document.getElementById('bulk-bar');
    const count = selectedSessions.size;
    if (count > 0) {
      bar.classList.add('visible');
      document.getElementById('bulk-count').textContent = count + ' session' + (count !== 1 ? 's' : '') + ' selected';
    } else {
      bar.classList.remove('visible');
    }
  }

  // Bulk actions
  document.getElementById('bulk-delete-btn').addEventListener('click', function() {
    const count = selectedSessions.size;
    if (count === 0) return;
    showDeleteModal(count, async function() {
      const sessions = [];
      selectedSessions.forEach(key => {
        const [slug, ...rest] = key.split('/');
        sessions.push({ slug, id: rest.join('/') });
      });
      try {
        await fetch('/api/sessions/bulk-delete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessions })
        });
        const keys = new Set(selectedSessions);
        sessionsData = sessionsData.filter(s => !keys.has(s.repoSlug + '/' + s.sessionId));
        selectedSessions.clear();
        renderSessions(document.getElementById('tab-sessions'));
        updateBulkBar();
      } catch (err) {
        alert('Bulk delete failed: ' + err.message);
      }
    });
  });

  document.getElementById('bulk-clear-btn').addEventListener('click', function() {
    selectedSessions.clear();
    renderSessions(document.getElementById('tab-sessions'));
    updateBulkBar();
  });

  // --- Delete modal ---
  function showDeleteModal(count, callback) {
    const modal = document.getElementById('delete-modal');
    document.getElementById('delete-modal-msg').textContent =
      'Delete ' + count + ' session' + (count !== 1 ? 's' : '') + '? This cannot be undone.';
    modal.classList.add('visible');
    pendingDeleteCallback = callback;
    document.getElementById('modal-cancel').focus();
  }

  function hideDeleteModal() {
    document.getElementById('delete-modal').classList.remove('visible');
    pendingDeleteCallback = null;
  }

  document.getElementById('modal-cancel').addEventListener('click', hideDeleteModal);
  document.getElementById('modal-confirm').addEventListener('click', function() {
    if (pendingDeleteCallback) {
      pendingDeleteCallback();
    }
    hideDeleteModal();
  });
  document.getElementById('delete-modal').addEventListener('click', function(e) {
    if (e.target === this) hideDeleteModal();
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      hideDeleteModal();
      hideTakeawayModal();
    }
  });

  // --- Takeaway modal ---
  function showTakeawayModal(repo, project, title) {
    const modal = document.getElementById('takeaway-modal');
    document.getElementById('takeaway-modal-title').textContent = 'Takeaway: ' + title;
    document.getElementById('takeaway-modal-content').textContent = 'Loading...';
    modal.classList.add('visible');
    fetch('/api/takeaway/' + encodeURIComponent(repo) + '/' + encodeURIComponent(project))
      .then(function(r) {
        if (!r.ok) throw new Error('Not found');
        return r.text();
      })
      .then(function(text) {
        document.getElementById('takeaway-modal-content').textContent = text;
      })
      .catch(function() {
        document.getElementById('takeaway-modal-content').textContent = 'Failed to load takeaway.';
      });
  }

  function hideTakeawayModal() {
    document.getElementById('takeaway-modal').classList.remove('visible');
  }

  document.getElementById('takeaway-modal-close').addEventListener('click', hideTakeawayModal);
  document.getElementById('takeaway-modal').addEventListener('click', function(e) {
    if (e.target === this) hideTakeawayModal();
  });

  // Delegate click on .view-takeaway links
  document.addEventListener('click', function(e) {
    const link = e.target.closest('.view-takeaway');
    if (link) {
      e.preventDefault();
      e.stopPropagation();
      showTakeawayModal(link.dataset.repo, link.dataset.project, link.dataset.title);
    }
  });

  // --- Knowledge ---
  let knowledgeSearch = '';

  async function loadKnowledge() {
    const el = document.getElementById('tab-knowledge');
    try {
      knowledgeData = await apiFetch('/api/knowledge');
      knowledgeLoaded = true;
      renderKnowledge(el);
    } catch (e) {
      el.innerHTML = '<div class="error-msg">Failed to load knowledge base: ' + esc(e.message) + '</div>';
    }
  }

  function renderKnowledge(el) {
    const entries = Array.isArray(knowledgeData) ? knowledgeData : (knowledgeData && knowledgeData.entries) || [];
    let html = '<div class="search-bar"><input type="search" id="knowledge-search" placeholder="Search by tag or summary..." value="' + esc(knowledgeSearch) + '" aria-label="Search knowledge base"></div>';

    let filtered = entries;
    if (knowledgeSearch) {
      const q = knowledgeSearch.toLowerCase();
      filtered = entries.filter(e =>
        (e.summary || '').toLowerCase().includes(q) ||
        (e.tags || []).some(t => t.toLowerCase().includes(q))
      );
    }

    if (filtered.length === 0) {
      html += '<div class="empty-msg">No completed projects in the knowledge base yet.</div>';
    } else {
      html += '<div class="knowledge-grid">';
      filtered.forEach(e => {
        html += `<div class="knowledge-card">
          <div class="card-header">
            <span class="card-title">${esc(e.project)}</span>
            <span class="card-date">${formatDate(e.completedAt)}</span>
          </div>
          <span class="badge repo">${esc(e.repoDisplay || e.repo || '')}</span>
          <div class="card-summary">${esc(e.summary || '')}</div>
          <div class="card-tags">${(e.tags || []).map(t => '<span class="tag-pill">' + esc(t) + '</span>').join('')}</div>
        </div>`;
      });
      html += '</div>';
    }
    el.innerHTML = html;

    document.getElementById('knowledge-search').addEventListener('input', function() {
      knowledgeSearch = this.value;
      renderKnowledge(el);
    });
    // Re-focus search after render
    const searchEl = document.getElementById('knowledge-search');
    if (document.activeElement && document.activeElement.id === 'knowledge-search') {
      searchEl.focus();
      searchEl.setSelectionRange(searchEl.value.length, searchEl.value.length);
    }
  }

  // --- Init ---
  function init() {
    const hash = window.location.hash.replace('#', '') || 'overview';
    const valid = ['overview', 'projects', 'sessions', 'knowledge'];
    switchTab(valid.includes(hash) ? hash : 'overview');
  }

  window.addEventListener('hashchange', function() {
    const hash = window.location.hash.replace('#', '') || 'overview';
    const valid = ['overview', 'projects', 'sessions', 'knowledge'];
    if (valid.includes(hash)) switchTab(hash);
  });

  init();
})();
</script>
</body>
</html>
